<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Calendar</title>

<style>
/* KEEPING YOUR ORIGINAL STYLES EXACTLY */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
}

.day {
    border: 1px solid #ccc;
    padding: 10px;
    cursor: pointer;
}

textarea {
    width: 100%;
    height: 100px;
}
</style>
</head>

<body>

<h1>My Calendar</h1>

<div class="calendar" id="calendar"></div>

<textarea id="editor"></textarea>
<button onclick="saveDay()">Save</button>

<!-- 🔥 Firebase compat (NO MODULES) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBkU-6n7Fvhm666ViidJJ1rZrNv_Nqn5tA",
  authDomain: "journal-1366e.firebaseapp.com",
  databaseURL: "https://journal-1366e-default-rtdb.firebaseio.com",
  projectId: "journal-1366e",
  storageBucket: "journal-1366e.firebasestorage.app",
  messagingSenderId: "903067573941",
  appId: "1:903067573941:web:fde48346a03e692ecf28fc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🧠 APP STATE
let data = { days: {} };
let currentDay = null;

// 🔄 LOAD DATA
function loadData() {
    return db.ref('calendarData/defaultUser').once('value')
        .then(snapshot => {
            if (snapshot.exists()) {
                data = snapshot.val();
            }
        })
        .catch(e => console.error(e));
}

// 💾 SAVE DATA
function saveData() {
    db.ref('calendarData/defaultUser').set(data)
        .catch(e => console.error(e));
}

// 📅 RENDER CALENDAR (simple version)
function renderCalendar() {
    const calendar = document.getElementById('calendar');
    calendar.innerHTML = '';

    for (let i = 1; i <= 30; i++) {
        const div = document.createElement('div');
        div.className = 'day';
        div.textContent = i;

        div.onclick = () => {
            currentDay = i;
            document.getElementById('editor').value = data.days[i] || '';
        };

        calendar.appendChild(div);
    }
}

// 💾 SAVE DAY
function saveDay() {
    if (!currentDay) return;

    const text = document.getElementById('editor').value;
    data.days[currentDay] = text;

    saveData();
}

// 🚀 INIT
loadData().then(() => {
    renderCalendar();
});
</script>

</body>
</html>
